<div class="register-container">
  <h2>Register</h2>
  <form>
    <label>
      Email
      <input type="email" name="email" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <label>
      Confirm Password
      <input type="password" name="confirmPassword" required />
    </label>
    <button type="submit">Register</button>
  </form>
</div>
